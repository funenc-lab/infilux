<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http: local-file: local-image:; media-src 'self' https: http: local-file: local-image: blob: data:; connect-src 'self' local-file: local-image: https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net">
    <title>Infilux</title>
    <script src="./bootstrap-head.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bootstrap-bg: #f5f7fb;
        --bootstrap-surface: rgba(255, 255, 255, 0.86);
        --bootstrap-border: rgba(48, 65, 93, 0.1);
        --bootstrap-text: rgba(20, 28, 41, 0.94);
        --bootstrap-muted: rgba(88, 100, 120, 0.78);
        --bootstrap-muted-soft: rgba(112, 130, 156, 0.2);
        --bootstrap-accent: rgba(78, 113, 208, 0.92);
        --bootstrap-accent-soft: rgba(78, 113, 208, 0.14);
        --bootstrap-top-glow: rgba(255, 255, 255, 0.58);
        --bootstrap-corner-glow: rgba(96, 126, 198, 0.16);
        --bootstrap-shell-line: rgba(48, 65, 93, 0.12);
        --bootstrap-panel-line: rgba(255, 255, 255, 0.8);
        --bootstrap-icon-border: rgba(48, 65, 93, 0.1);
        --bootstrap-icon-bg: rgba(255, 255, 255, 0.72);
        --bootstrap-footer-line: rgba(48, 65, 93, 0.14);
        --bootstrap-progress-value: 25%;
        --bootstrap-panel-shadow:
          0 16px 40px rgba(94, 113, 145, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.74);
      }

      html.dark {
        color-scheme: dark;
        --bootstrap-bg: #0f1216;
        --bootstrap-surface: rgba(18, 22, 28, 0.34);
        --bootstrap-border: rgba(255, 255, 255, 0.08);
        --bootstrap-text: rgba(244, 247, 250, 0.96);
        --bootstrap-muted: rgba(180, 191, 203, 0.78);
        --bootstrap-muted-soft: rgba(132, 145, 160, 0.32);
        --bootstrap-accent: rgba(163, 193, 255, 0.9);
        --bootstrap-accent-soft: rgba(163, 193, 255, 0.18);
        --bootstrap-top-glow: rgba(255, 255, 255, 0.03);
        --bootstrap-corner-glow: rgba(120, 140, 180, 0.12);
        --bootstrap-shell-line: rgba(255, 255, 255, 0.14);
        --bootstrap-panel-line: rgba(255, 255, 255, 0.16);
        --bootstrap-icon-border: rgba(255, 255, 255, 0.08);
        --bootstrap-icon-bg: rgba(255, 255, 255, 0.02);
        --bootstrap-footer-line: rgba(255, 255, 255, 0.12);
        --bootstrap-progress-value: 25%;
        --bootstrap-panel-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          linear-gradient(180deg, var(--bootstrap-top-glow), transparent 22%),
          radial-gradient(circle at top left, var(--bootstrap-corner-glow), transparent 38%),
          var(--bootstrap-bg);
      }

      body {
        color: var(--bootstrap-text);
        font-family:
          "SF Pro Text",
          "SF Pro Display",
          "Segoe UI",
          "Helvetica Neue",
          sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .bootstrap-shell {
        position: relative;
        box-sizing: border-box;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .bootstrap-shell::before {
        content: "";
        position: absolute;
        top: 0;
        left: 24px;
        right: 24px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--bootstrap-shell-line) 50%,
          transparent 100%
        );
      }

      .bootstrap-panel {
        position: relative;
        overflow: hidden;
        width: min(36rem, 100%);
        border: 1px solid var(--bootstrap-border);
        background: var(--bootstrap-surface);
        box-shadow: var(--bootstrap-panel-shadow);
        padding: 20px 20px 18px;
      }

      .bootstrap-panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--bootstrap-panel-line) 50%,
          transparent 100%
        );
      }

      .bootstrap-header {
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }

      .bootstrap-icon {
        position: relative;
        display: flex;
        width: 44px;
        height: 44px;
        flex: none;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        border: 1px solid var(--bootstrap-icon-border);
        background: var(--bootstrap-icon-bg);
      }

      .bootstrap-icon-halo {
        position: absolute;
        inset: 10px;
        border-radius: 999px;
        background: var(--bootstrap-accent-soft);
      }

      .bootstrap-icon-dot {
        position: relative;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--bootstrap-accent);
      }

      .bootstrap-copy {
        min-width: 0;
      }

      .bootstrap-eyebrow {
        margin: 0;
        color: var(--bootstrap-muted);
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .bootstrap-title {
        margin: 0;
        font-size: 19px;
        font-weight: 650;
        letter-spacing: -0.03em;
        line-height: 1.2;
      }

      .bootstrap-description {
        margin: 8px 0 0;
        color: var(--bootstrap-muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .bootstrap-footer {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 20px;
        color: var(--bootstrap-muted);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .bootstrap-footer::before {
        content: "";
        width: 40px;
        height: 1px;
        background: var(--bootstrap-footer-line);
      }

      .bootstrap-progress {
        position: relative;
        overflow: hidden;
        flex: 1;
        height: 6px;
        max-width: 320px;
        border-radius: 999px;
        background: var(--bootstrap-muted-soft);
      }

      .bootstrap-progress::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: var(--bootstrap-progress-value, 25%);
        border-radius: inherit;
        background: var(--bootstrap-accent);
        animation: bootstrap-pulse 1.4s ease-in-out infinite;
      }

      @keyframes bootstrap-pulse {
        0% {
          opacity: 0.62;
          transform: scaleX(0.92);
        }
        50% {
          opacity: 1;
          transform: scaleX(1);
        }
        100% {
          opacity: 0.62;
          transform: scaleX(0.92);
        }
      }
    </style>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div
        class="bootstrap-shell"
        data-startup-shell="static-bootstrap"
        data-startup-layout="status-dock"
      >
        <div class="bootstrap-panel" role="status" aria-live="polite" aria-busy="true">
          <div class="bootstrap-header">
            <div class="bootstrap-icon" aria-hidden="true">
              <div class="bootstrap-icon-halo"></div>
              <div class="bootstrap-icon-dot"></div>
            </div>
            <div
              class="bootstrap-copy"
              data-startup-eyebrow="Infilux"
              data-startup-title=""
            >
              <p class="bootstrap-eyebrow">Infilux</p>
              <h1 class="bootstrap-title"></h1>
              <p class="bootstrap-description"></p>
            </div>
          </div>
          <div class="bootstrap-footer">
            <div class="bootstrap-progress" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./bootstrap-body.js"></script>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
