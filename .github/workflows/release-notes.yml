name: Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to update (for example v0.1.6)'
        required: true

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "name=$TAG" >> $GITHUB_OUTPUT

      - name: Get Previous Tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Collect Release Asset Names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release view "$TAG" --json assets --jq '.assets[].name' > release-assets.txt
          cat release-assets.txt

      - name: Generate Release Notes
        run: |
          node scripts/release/generate-release-notes.mjs \
            --tag "${{ steps.tag.outputs.name }}" \
            --previous-tag "${{ steps.prev_tag.outputs.prev_tag }}" \
            --repository "${{ github.repository }}" \
            --asset-file release-assets.txt \
            --output release-notes.md
          cat release-notes.md

      - name: Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ steps.tag.outputs.name }} --notes-file release-notes.md
