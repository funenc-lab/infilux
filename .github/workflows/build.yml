name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      allow_unsigned_macos:
        description: 'Allow unsigned macOS bundles for this manual build'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: preflight-${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: preflight-${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # 先构建 Vite 产物，共享给所有平台
  build-app:
    needs: release-preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: out/
          retention-days: 1

  build-mac:
    needs: build-app
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: out/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-pnpm-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect macOS signing configuration
        id: macos_signing
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WORKFLOW_ALLOW_UNSIGNED_MACOS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned_macos || 'false' }}
          REPO_ALLOW_UNSIGNED_MACOS_RELEASE: ${{ vars.ALLOW_UNSIGNED_MACOS_RELEASE }}
          IS_TAG_BUILD: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
        run: |
          set -euo pipefail

          missing=()
          allow_unsigned="false"

          if [[ "${IS_TAG_BUILD}" != "true" ]]; then
            allow_unsigned="true"
          elif [[ "${WORKFLOW_ALLOW_UNSIGNED_MACOS}" == "true" || "${REPO_ALLOW_UNSIGNED_MACOS_RELEASE}" == "true" ]]; then
            allow_unsigned="true"
          fi

          [[ -n "${APPLE_CERTIFICATE}" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "${APPLE_CERTIFICATE_PASSWORD}" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "${APPLE_API_KEY}" ]] || missing+=("APPLE_API_KEY")
          [[ -n "${APPLE_API_ISSUER}" ]] || missing+=("APPLE_API_ISSUER")
          [[ -n "${APPLE_API_KEY_P8}" ]] || missing+=("APPLE_API_KEY_P8")

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
            echo "missing=" >> "${GITHUB_OUTPUT}"
            echo "unsigned_allowed=false" >> "${GITHUB_OUTPUT}"
            echo "macOS signing is enabled for this build."
          elif [[ "${allow_unsigned}" == "true" ]]; then
            missing_csv="$(IFS=,; echo "${missing[*]}")"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "missing=${missing_csv}" >> "${GITHUB_OUTPUT}"
            echo "unsigned_allowed=true" >> "${GITHUB_OUTPUT}"
            echo "macOS signing is disabled because these secrets are missing: ${missing_csv}"
          else
            missing_csv="$(IFS=,; echo "${missing[*]}")"
            echo "::error title=Signed macOS release is required::Apple signing secrets are missing (${missing_csv}). Configure the APPLE_* secrets or explicitly allow unsigned macOS output."
            exit 1
          fi

      - name: Announce unsigned macOS build
        if: ${{ steps.macos_signing.outputs.unsigned_allowed == 'true' }}
        env:
          SIGNING_MISSING: ${{ steps.macos_signing.outputs.missing }}
        run: |
          echo "::notice title=Unsigned macOS build::Apple signing secrets are missing (${SIGNING_MISSING}). This workflow is continuing with unsigned macOS output."

      - name: Prepare Apple notarization key
        if: ${{ steps.macos_signing.outputs.ready == 'true' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail

          key_dir="${RUNNER_TEMP}/private_keys"
          key_path="${key_dir}/AuthKey_${APPLE_API_KEY_ID}.p8"

          mkdir -p "${key_dir}"
          printf '%s' "${APPLE_API_KEY_P8}" > "${key_path}"
          chmod 600 "${key_path}"

          echo "APPLE_API_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
          echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}" >> "${GITHUB_ENV}"

      - name: Import Apple Certificate
        if: ${{ steps.macos_signing.outputs.ready == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          certificate_path="${RUNNER_TEMP}/infilux-signing-certificate.p12"
          keychain_path="${RUNNER_TEMP}/infilux-signing.keychain-db"
          keychain_password="$(uuidgen)"

          CERTIFICATE_PATH="${certificate_path}" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          certificate = os.environ["APPLE_CERTIFICATE"]
          certificate_path = Path(os.environ["CERTIFICATE_PATH"])
          certificate_path.write_bytes(base64.b64decode(certificate))
          PY

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -k "${keychain_path}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychain -d user -s "${keychain_path}"
          security default-keychain -s "${keychain_path}"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"
          security find-identity -v -p codesigning "${keychain_path}"

      - name: Build macOS (${{ matrix.arch }}) signed
        if: ${{ steps.macos_signing.outputs.ready == 'true' }}
        run: npx electron-builder --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Build macOS (${{ matrix.arch }}) unsigned
        if: ${{ steps.macos_signing.outputs.ready != 'true' }}
        run: npx electron-builder --mac --${{ matrix.arch }} -c.mac.identity=null -c.mac.notarize=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload latest-mac.yml
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-${{ matrix.arch }}
          path: dist/latest-mac.yml
          retention-days: 1

  build-windows:
    needs: build-app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: out/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: out/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-remote-runtime-linux:
    needs: release-preflight
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: remote-runtime-${{ runner.os }}-${{ matrix.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: remote-runtime-${{ runner.os }}-${{ matrix.arch }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux remote runtime bundle (${{ matrix.arch }})
        run: node scripts/build-remote-runtime-bundle.mjs --arch=${{ matrix.arch }}

      - name: Upload remote runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-runtime-linux-${{ matrix.arch }}
          path: dist/remote-runtime/*
          retention-days: 1

      - name: Upload remote runtime bundle to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" dist/remote-runtime/* --clobber

  generate-release-notes:
    needs: [build-mac, build-windows, build-linux, build-remote-runtime-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download latest-mac.yml artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-mac-*
          path: mac-yml-artifacts

      - name: Merge latest-mac.yml
        run: |
          ARM64_YML="mac-yml-artifacts/latest-mac-arm64/latest-mac.yml"
          X64_YML="mac-yml-artifacts/latest-mac-x64/latest-mac.yml"

          echo "=== ARM64 YML ===" && cat "$ARM64_YML"
          echo -e "\n=== X64 YML ===" && cat "$X64_YML"

          # 安装 yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # 转换为 JSON，用 jq 合并，再转回 YAML
          ARM64_JSON=$(yq -o=json "$ARM64_YML")
          X64_JSON=$(yq -o=json "$X64_YML")

          # 使用 jq 合并 files 数组，保留 arm64 的其他字段
          echo "$ARM64_JSON" | jq --argjson x64 "$(echo "$X64_JSON" | jq '.files')" \
            '.files = .files + $x64' | yq -P > latest-mac.yml

          echo -e "\n=== MERGED YML ===" && cat latest-mac.yml

      - name: Upload merged latest-mac.yml to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # 删除旧的 latest-mac.yml（如果存在）
          gh release delete-asset "$TAG" latest-mac.yml --yes 2>/dev/null || true
          # 上传合并后的 yml
          gh release upload "$TAG" latest-mac.yml --clobber

      - name: Set Tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "name=$TAG" >> $GITHUB_OUTPUT
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Linux remote runtime release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"

          node - <<'NODE' > expected-remote-runtime-assets.txt
          const fs = require('node:fs');

          function readConstant(filePath, pattern) {
            const content = fs.readFileSync(filePath, 'utf8');
            const match = content.match(pattern);
            if (!match || !match[1]) {
              throw new Error(`Failed to read constant from ${filePath}`);
            }
            return match[1];
          }

          const serverVersion = readConstant(
            'src/main/services/remote/RemoteHelperSource.ts',
            /REMOTE_SERVER_VERSION = '([^']+)'/
          );
          const nodeVersion = readConstant(
            'src/main/services/remote/RemoteRuntimeAssets.ts',
            /MANAGED_REMOTE_NODE_VERSION = '([^']+)'/
          );

          for (const arch of ['x64', 'arm64']) {
            const archive = `enso-remote-runtime-v${serverVersion}-node-v${nodeVersion}-linux-${arch}.tar.gz`;
            console.log(archive);
            console.log(`${archive}.sha256`);
          }
          NODE

          echo "Expected remote runtime assets:"
          cat expected-remote-runtime-assets.txt

          echo "Actual release assets:"
          gh release view "$TAG" --json assets --jq '.assets[].name' | sort | tee actual-release-assets.txt

          missing=0
          while IFS= read -r asset; do
            if ! grep -Fx -- "$asset" actual-release-assets.txt >/dev/null; then
              echo "Missing release asset: $asset"
              missing=1
            fi
          done < expected-remote-runtime-assets.txt

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Get Previous Tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Collect Release Asset Names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release view "$TAG" --json assets --jq '.assets[].name' > release-assets.txt
          cat release-assets.txt

      - name: Generate Release Notes
        id: notes
        run: |
          node scripts/release/generate-release-notes.mjs \
            --tag "${{ steps.tag.outputs.name }}" \
            --previous-tag "${{ steps.prev_tag.outputs.prev_tag }}" \
            --repository "${{ github.repository }}" \
            --asset-file release-assets.txt \
            --output release-notes.md
          cat release-notes.md

      - name: Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if [[ "$TAG" == *-* ]]; then
            gh release edit "$TAG" --draft=false --prerelease --notes-file release-notes.md
          else
            gh release edit "$TAG" --draft=false --notes-file release-notes.md --latest
          fi
